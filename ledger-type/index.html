<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账簿类型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #000;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* 顶部装饰条 */
        .top-bar {
            height: 4px;
            background: #00bfa5;
        }

        /* 标题区域 */
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #e8e8e8;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #262626;
            letter-spacing: 0.5px;
        }

        /* 筛选区域 */
        .filter-area {
            padding: 20px 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #e8e8e8;
            background: #fafafa;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item input,
        .filter-item select {
            height: 36px;
            padding: 0 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            color: #595959;
            background: #fff;
            outline: none;
            transition: all 0.3s;
            min-width: 140px;
        }

        .filter-item input:focus,
        .filter-item select:focus {
            border-color: #00bfa5;
            box-shadow: 0 0 0 3px rgba(0, 191, 165, 0.1);
        }

        .filter-item input::placeholder {
            color: #bfbfbf;
        }

        .filter-icon {
            width: 16px;
            height: 16px;
            color: #8c8c8c;
            cursor: pointer;
        }

        /* 表格区域 */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #d9d9d9;
        }

        th {
            padding: 14px 16px;
            text-align: center;
            font-weight: 600;
            color: #262626;
            border-bottom: 2px solid #bfbfbf;
            white-space: nowrap;
        }

        td {
            padding: 16px;
            text-align: center;
            color: #262626;
            border-bottom: 1px solid #e8e8e8;
            height: 60px;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        tbody tr.selected {
            outline: 2px solid #1890ff;
            outline-offset: -2px;
            background: #e6f7ff;
        }

        /* 状态指示器 */
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00bfa5;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .status-text {
            vertical-align: middle;
        }

        /* 省略号行 */
        .ellipsis {
            color: #8c8c8c;
            letter-spacing: 2px;
        }

        /* 空行样式 */
        .empty-row td {
            height: 50px;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .filter-area {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* 滚动条样式 */
        .table-container::-webkit-scrollbar {
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部装饰条 -->
        <div class="top-bar"></div>
        
        <!-- 标题 -->
        <div class="header">
            <h1>账簿类型</h1>
        </div>
        
        <!-- 筛选区域 -->
        <div class="filter-area">
            <div class="filter-item">
                <input type="text" placeholder="编码">
            </div>
            <div class="filter-item">
                <input type="text" placeholder="名称">
            </div>
            <div class="filter-item">
                <input type="text" placeholder="会计期间方案">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="4" y1="12" x2="21" y2="12"></line>
                    <line x1="6" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
            <div class="filter-item">
                <input type="text" placeholder="本位币">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="4" y1="12" x2="21" y2="12"></line>
                    <line x1="6" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
            <div class="filter-item">
                <input type="text" placeholder="科目体系">
            </div>
        </div>
        
        <!-- 表格 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">序号</th>
                        <th style="width: 120px;">编码</th>
                        <th style="width: 160px;">名称</th>
                        <th style="width: 200px;">会计期间方案</th>
                        <th style="width: 180px;">科目体系</th>
                        <th style="width: 120px;">本位币</th>
                        <th style="width: 160px;">财务核算账簿</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td></td>
                        <td>001</td>
                        <td>基准账簿</td>
                        <td>基准会计期间方案</td>
                        <td>基准科目体系</td>
                        <td>人民币</td>
                        <td>
                            <span class="status-dot"></span>
                            <span class="status-text">是</span>
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td class="ellipsis">......</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr class="empty-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr class="empty-row selected">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr class="empty-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr class="empty-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr class="empty-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr class="empty-row">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 点击行选中效果
        document.querySelectorAll('tbody tr').forEach(row => {
            row.addEventListener('click', function() {
                document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // 输入框焦点效果
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
