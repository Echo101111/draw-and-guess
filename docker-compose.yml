services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - word-data:/app/server/dist/server/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - draw-and-guess

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_SERVER_URL=
    ports:
      - "8888:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - draw-and-guess

volumes:
  word-data:

networks:
  draw-and-guess:
    driver: bridge
