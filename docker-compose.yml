services:
  turn:
    image: instrumentisto/coturn:latest
    network_mode: host
    command:
      - --log-file=stdout
      - --external-ip=${SERVER_IP}
      - --listening-port=3478
      - --realm=${TURN_REALM}
      - --use-auth-secret
      - --static-auth-secret=${TURN_CREDENTIAL}
      - --min-port=49152
      - --max-port=65535
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - PORT=3000
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8888}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - TURN_SERVER_URL=${TURN_SERVER_URL}
      - TURN_USERNAME=${TURN_USERNAME:-party-game}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - word-data:/app/server/dist/server/data
    restart: unless-stopped
    networks:
      - draw-and-guess
    depends_on:
      - turn

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_SERVER_URL=
    ports:
      - "127.0.0.1:8888:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - draw-and-guess

volumes:
  word-data:

networks:
  draw-and-guess:
    driver: bridge
